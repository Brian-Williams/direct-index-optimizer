name: Update S&P 500 Cache

on:
  # 10:00 AM ET = 14:00 UTC (EDT, Mar–Nov) / 15:00 UTC (EST, Nov–Mar)
  # Run at latter time on weekdays to cover daylight saving transitions.
  schedule:
  #  - cron: "0 14 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install pandas yfinance lxml html5lib beautifulsoup4

      - name: Update S&P 500 cache
        run: python update_sp500_cache.py

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sp500_cache.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: auto-update S&P 500 cache $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
